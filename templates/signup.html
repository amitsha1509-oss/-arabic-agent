<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה — ערבית חבצלות</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #FAFAFA; color: #2D3748; min-height: 100vh; display: flex; align-items: center; justify-content: center; direction: rtl; padding: 20px; }
        .card { background: white; border-radius: 28px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.09); border: 3px solid #F0FDF4; }
        .logo { text-align: center; font-size: 36px; margin-bottom: 8px; }
        .brand { text-align: center; font-size: 22px; font-weight: 800; color: #58CC02; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #A0AEC0; font-size: 14px; margin-bottom: 32px; font-weight: 500; }
        .flash { padding: 12px 16px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: 600; }
        .flash.error { background: #FFF5F5; color: #C53030; border: 2px solid #FEB2B2; }
        .flash.success { background: #F0FFF4; color: #276749; border: 2px solid #9AE6B4; }
        label { display: block; font-size: 13px; font-weight: 700; color: #4A5568; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px 16px; border: 2px solid #E2E8F0; border-radius: 12px; font-size: 15px; font-family: inherit; color: #2D3748; transition: border-color 0.2s; margin-bottom: 18px; background: white; }
        input:focus, select:focus { outline: none; border-color: #58CC02; }
        .hint { font-size: 12px; color: #A0AEC0; margin-top: -14px; margin-bottom: 18px; font-weight: 500; }
        .btn { width: 100%; padding: 14px; background: #58CC02; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
        .btn:hover { background: #46A302; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(88,204,2,0.3); }
        .links { text-align: center; margin-top: 24px; }
        .links a { color: #7C3AED; font-size: 14px; font-weight: 600; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .section-label { font-size: 12px; font-weight: 800; color: #A0AEC0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; margin-top: 4px; padding-top: 18px; border-top: 2px solid #F7FAFC; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🌸</div>
    <div class="brand">ערבית חבצלות</div>
    <div class="subtitle">צור חשבון חדש והתחל ללמוד ערבית</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <label>שם משתמש</label>
        <input type="text" name="username" placeholder="בחר שם משתמש" required autofocus>

        <label>סיסמה</label>
        <input type="password" name="password" placeholder="לפחות 6 תווים" required>
        <div class="hint">לפחות 6 תווים</div>

        <div class="section-label">שאלת אבטחה לשחזור סיסמה</div>

        <label>שאלה</label>
        <select name="security_question" required>
            <option value="" disabled selected>בחר שאלה...</option>
            {% for q in questions %}
                <option value="{{ q }}">{{ q }}</option>
            {% endfor %}
        </select>

        <label>תשובה</label>
        <input type="text" name="security_answer" placeholder="התשובה שלך" required>
        <div class="hint">שמור את התשובה — תצטרך אותה אם תשכח סיסמה</div>

        <button type="submit" class="btn">יצירת חשבון</button>
    </form>

    <div class="links">
        <a href="/login">יש לך חשבון? התחבר כאן</a>
    </div>
</div>
</body>
</html>
