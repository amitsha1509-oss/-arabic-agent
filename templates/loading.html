<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכין שיעור...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #FAFAFA; color: #2D3748; min-height: 100vh; direction: rtl; display: flex; flex-direction: column; }

        .navbar { background: white; border-bottom: 2px solid #F0F0F0; padding: 0 32px; height: 64px; display: flex; align-items: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .nav-inner { max-width: 960px; margin: 0 auto; width: 100%; display: flex; align-items: center; justify-content: space-between; }
        .nav-brand { font-size: 20px; font-weight: 800; color: #58CC02; text-decoration: none; }

        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }

        .card { background: white; border-radius: 28px; padding: 56px 48px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.08); border: 3px solid #F0FDF4; max-width: 440px; width: 100%; }

        .spinner-wrap { margin-bottom: 32px; }
        .spinner { width: 72px; height: 72px; border: 6px solid #E8F5E9; border-top-color: #58CC02; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .arabic-deco { font-size: 42px; margin-bottom: 16px; }
        .title { font-size: 22px; font-weight: 800; color: #2D3748; margin-bottom: 10px; }
        .subtitle { font-size: 15px; color: #A0AEC0; font-weight: 500; min-height: 22px; transition: opacity 0.4s; }

        .dots { display: inline-flex; gap: 6px; margin-top: 28px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #BBF7D0; animation: bounce 1.2s ease-in-out infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.7); background: #BBF7D0; } 40% { transform: scale(1.2); background: #58CC02; } }

        .error-card { background: #FFF5F5; border-color: #FEB2B2; }
        .error-title { color: #C53030; }
        .error-sub { color: #FC8181; }
        .back-btn { display: inline-block; margin-top: 24px; background: #58CC02; color: white; text-decoration: none; padding: 12px 28px; border-radius: 14px; font-weight: 700; font-size: 15px; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-inner">
        <a href="/" class="nav-brand">🌸 ערבית חבצלות</a>
    </div>
</nav>

<div class="content">
    <div class="card" id="card">
        <div class="arabic-deco">📖</div>
        <div class="spinner-wrap">
            <div class="spinner" id="spinner"></div>
        </div>
        <div class="title" id="title">מכין את השיעור שלך</div>
        <div class="subtitle" id="subtitle">בוחר נושא מעניין...</div>
        <div class="dots" id="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</div>

<script>
    const jobId = "{{ job_id }}";
    const messages = [
        "בוחר נושא מעניין...",
        "כותב כתבה בערבית ספרותית...",
        "בוחר מילות מפתח...",
        "מכין הסברי הגייה...",
        "מחפש שורשים...",
        "כמעט מוכן...",
        "מסיים..."
    ];
    let msgIndex = 0;
    const subtitleEl = document.getElementById("subtitle");

    const msgInterval = setInterval(() => {
        msgIndex = Math.min(msgIndex + 1, messages.length - 1);
        subtitleEl.style.opacity = 0;
        setTimeout(() => {
            subtitleEl.textContent = messages[msgIndex];
            subtitleEl.style.opacity = 1;
        }, 200);
    }, 4000);

    function poll() {
        fetch(`/job-status/${jobId}`)
            .then(r => r.json())
            .then(job => {
                if (job.status === "done") {
                    clearInterval(msgInterval);
                    window.location.href = `/lesson/${job.filename}`;
                } else if (job.status === "error") {
                    clearInterval(msgInterval);
                    const card = document.getElementById("card");
                    card.classList.add("error-card");
                    card.innerHTML = `
                        <div class="arabic-deco">⚠️</div>
                        <div class="title error-title">משהו השתבש</div>
                        <div class="subtitle error-sub">${job.error || "שגיאה לא ידועה"}</div>
                        <a href="/" class="back-btn">חזור לדף הבית</a>
                    `;
                } else {
                    setTimeout(poll, 2000);
                }
            })
            .catch(() => setTimeout(poll, 3000));
    }

    setTimeout(poll, 2000);
</script>
</body>
</html>
